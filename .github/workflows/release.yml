name: Publish release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/shelly_cloud/manifest.json'))['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Read release notes
        id: notes
        run: |
          if [ -f info.md ]; then
            NOTES=$(cat info.md)
          else
            NOTES="Release ${{ steps.version.outputs.version }}"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Shelly Cloud ${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
